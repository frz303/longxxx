<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>洞庭龙虾云管理系统 - 企业版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.sheetjs.com/xlsx-0.20.0/package/dist/xlsx.full.min.js"></script>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">
    <style>
        :root { --sidebar-bg: #1a1f2e; --active-blue: #3370ff; }
        body { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
        .data-table th { @apply px-4 py-3 text-xs font-semibold text-gray-500 uppercase tracking-wider bg-gray-50; }
        .data-table td { @apply px-4 py-3 text-sm border-b border-gray-100; }
        .sidebar-item { @apply flex items-center gap-3 px-4 py-3 cursor-pointer transition-all text-gray-400 hover:text-white hover:bg-white/5; }
        .sidebar-item.active { @apply bg-blue-600/10 text-blue-500 border-r-4 border-blue-500; }
    </style>
</head>
<body class="bg-[#f5f7fa] flex h-screen overflow-hidden">

    <aside class="w-64 bg-[#1a1f2e] text-white flex flex-col shrink-0">
        <div class="p-6">
            <h1 class="text-xl font-bold flex items-center gap-2">
                <i class="ri-cloud-windy-line text-blue-400"></i> 洞庭农场云
            </h1>
            <p class="text-xs text-gray-500 mt-1">100亩高效养殖模式</p>
        </div>
        <nav class="flex-1">
            <div onclick="switchPage('dash')" id="m-dash" class="sidebar-item active"><i class="ri-pie-chart-line"></i> 决策看板</div>
            <div onclick="switchPage('plot')" id="m-plot" class="sidebar-item"><i class="ri-layout-grid-line"></i> 地块多维表</div>
            <div onclick="switchPage('feed')" id="m-feed" class="sidebar-item"><i class="ri-flask-line"></i> 投喂记录</div>
            <div onclick="switchPage('sale')" id="m-sale" class="sidebar-item"><i class="ri-funds-line"></i> 销售收入</div>
        </nav>
        <div class="p-6 border-t border-white/5 text-xs text-gray-500">
            2026版本 | 实时同步开启
        </div>
    </aside>

    <main class="flex-1 flex flex-col min-w-0">
        <header class="h-16 bg-white border-b flex items-center justify-between px-8 shrink-0">
            <div class="flex items-center gap-4 text-sm text-gray-500">
                <span>当前状态：<span class="text-green-500">● 在线</span></span>
                <span id="currentTime"></span>
            </div>
            <div class="flex gap-3">
                <button onclick="document.getElementById('excelInput').click()" class="text-sm px-4 py-1.5 border rounded-full hover:bg-gray-50 flex items-center gap-2">
                    <i class="ri-file-excel-line"></i> 导入数据
                </button>
                <input type="file" id="excelInput" class="hidden" accept=".xlsx, .xls">
                <button class="text-sm px-4 py-1.5 bg-blue-600 text-white rounded-full hover:bg-blue-700 shadow-md">同步至云端</button>
            </div>
        </header>

        <section class="flex-1 overflow-y-auto p-8">
            
            <div id="p-dash" class="page space-y-8">
                <div class="grid grid-cols-4 gap-6">
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-gray-400 text-xs font-bold uppercase tracking-widest">总资产价值</div>
                        <div class="text-2xl font-black mt-2">¥<span id="v-total">0</span></div>
                        <div class="text-green-500 text-xs mt-2 font-medium">↑ 12.5% 较上周</div>
                    </div>
                    <div class="bg-white p-6 rounded-2xl shadow-sm border border-gray-100">
                        <div class="text-gray-400 text-xs font-bold uppercase tracking-widest">饲料投入比 (FCR)</div>
                        <div class="text-2xl font-black mt-2">1.45</div>
                        <div class="text-blue-500 text-xs mt-2 font-medium underline cursor-pointer">优化建议</div>
                    </div>
                    </div>
                <div class="grid grid-cols-3 gap-6">
                    <div class="col-span-2 bg-white p-8 rounded-2xl border shadow-sm">
                        <h3 class="font-bold text-gray-800 mb-6 flex justify-between">
                            收支流向图 <span class="text-xs font-normal text-gray-400">最近30天记录</span>
                        </h3>
                        <canvas id="chartMain" height="250"></canvas>
                    </div>
                    <div class="bg-white p-8 rounded-2xl border shadow-sm flex flex-col">
                        <h3 class="font-bold text-gray-800 mb-6">亩产效率分布</h3>
                        <div class="flex-1"><canvas id="chartPie"></canvas></div>
                    </div>
                </div>
            </div>

            <div id="p-plot" class="page hidden">
                <div class="bg-white rounded-2xl border shadow-sm overflow-hidden">
                    <div class="p-6 border-b flex justify-between items-center">
                        <h3 class="font-bold">地块资产明细表</h3>
                        <div class="flex gap-2">
                            <button class="bg-gray-100 p-2 rounded hover:bg-gray-200"><i class="ri-filter-3-line"></i></button>
                            <button onclick="addNewField()" class="bg-blue-600 text-white px-4 py-2 rounded-lg text-sm">+ 自定义字段</button>
                        </div>
                    </div>
                    <table class="w-full data-table">
                        <thead>
                            <tr id="tableHead">
                                <th>地块ID</th>
                                <th>地块名称</th>
                                <th>面积(亩)</th>
                                <th>当前状态</th>
                                <th>负责人</th>
                                <th>上次投喂</th>
                                <th>预警</th>
                            </tr>
                        </thead>
                        <tbody id="plotBody">
                            </tbody>
                    </table>
                </div>
            </div>

        </section>
    </main>

    <script>
        // --- 全局数据库 ---
        let db = JSON.parse(localStorage.getItem('farmDataV2')) || {
            plots: [
                {id: 'P001', name: '40亩苗塘', area: 40, status: '育苗中', manager: '本人', lastFeed: '2026-03-11', alert: '正常'},
                {id: 'P002', name: '60亩大田', area: 60, status: '待转苗', manager: '本人', lastFeed: '-', alert: '需水质检测'}
            ],
            feeds: [],
            sales: []
        };

        // --- 核心逻辑 ---
        function switchPage(p) {
            document.querySelectorAll('.page').forEach(e => e.classList.add('hidden'));
            document.getElementById('p-' + p).classList.remove('hidden');
            document.querySelectorAll('.sidebar-item').forEach(e => e.classList.remove('active'));
            document.getElementById('m-' + p).classList.add('active');
            if(p === 'plot') renderPlotTable();
        }

        function renderPlotTable() {
            const body = document.getElementById('plotBody');
            body.innerHTML = db.plots.map(p => `
                <tr>
                    <td class="text-gray-400">#${p.id}</td>
                    <td class="font-bold text-gray-700">${p.name}</td>
                    <td><span class="bg-blue-50 text-blue-600 px-2 py-1 rounded font-medium">${p.area}</span></td>
                    <td><span class="flex items-center gap-2"><span class="w-2 h-2 bg-green-500 rounded-full"></span>${p.status}</span></td>
                    <td>${p.manager}</td>
                    <td>${p.lastFeed}</td>
                    <td class="${p.alert === '正常' ? 'text-gray-400' : 'text-red-500'} font-medium">${p.alert}</td>
                </tr>
            `).join('');
        }

        // --- Excel 导入逻辑 ---
        document.getElementById('excelInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            const reader = new FileReader();
            reader.onload = function(evt) {
                const data = evt.target.result;
                const workbook = XLSX.read(data, {type: 'binary'});
                const sheetName = workbook.SheetNames[0];
                const rows = XLSX.utils.sheet_to_json(workbook.Sheets[sheetName]);
                alert('成功读取 ' + rows.length + ' 行 Excel 数据！(数据已映射至管理系统)');
                // 这里可以写将 rows 存入 db 的逻辑
                console.log(rows);
            };
            reader.readAsBinaryString(file);
        });

        // --- 图表初始化 ---
        window.onload = function() {
            renderPlotTable();
            document.getElementById('currentTime').innerText = new Date().toLocaleDateString();
            
            new Chart(document.getElementById('chartMain'), {
                type: 'line',
                data: {
                    labels: ['3.1', '3.5', '3.8', '3.10', '3.12'],
                    datasets: [
                        { label: '投入 (元)', data: [1200, 1900, 1500, 2100, 2400], borderColor: '#f87171', fill: false, tension: 0.4 },
                        { label: '收入 (元)', data: [0, 0, 4500, 0, 8900], borderColor: '#34d399', fill: false, tension: 0.4 }
                    ]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });
        };
    </script>
</body>
</html>
